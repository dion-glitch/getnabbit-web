<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body { margin: 0; padding: 0; }
    html {
      background: linear-gradient(135deg, #2c245b 0%, #4a2a6f 42%, #96579b 100%);
    }
    body {
      width: 1200px; height: 800px; overflow: hidden;
      background: linear-gradient(135deg, #2c245b 0%, #4a2a6f 42%, #96579b 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }
    .frame {
      width: 1200px; height: 630px;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
    }
    .logo { height: 260px; margin-bottom: 56px; }
    .tagline {
      font-size: 48px; font-weight: 600;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img class="logo" src="nabbit-logo-handwritten.svg" alt="nabbit">
    <div class="tagline">Shared via Nabbit</div>
  </div>
</body>
</html>
